
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1.5rem 1rem; max-width: 560px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.progress-bar { height: 6px; background: var(--color-border-tertiary); border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.3s; }
.card-wrap { perspective: 900px; height: 220px; margin-bottom: 1.25rem; cursor: pointer; }
.card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s; }
.card.flipped { transform: rotateY(180deg); }
.face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
.back { transform: rotateY(180deg); }
.verb { font-size: 28px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.arabic { font-size: 16px; color: var(--color-text-secondary); direction: rtl; }
.prep-badge { margin-top: 14px; padding: 5px 16px; border-radius: 20px; font-size: 15px; font-weight: 500; background: #E1F5EE; color: #0F6E56; }
.hint { font-size: 12px; color: var(--color-text-tertiary); margin-top: 12px; }
.btns { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.btn { flex: 1; padding: 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); font-size: 14px; cursor: pointer; transition: background 0.15s; }
.btn:hover { background: var(--color-background-secondary); }
.btn.correct { border-color: #1D9E75; color: #0F6E56; }
.btn.wrong { border-color: #D85A30; color: #993C1D; }
.stats { display: flex; gap: 12px; }
.stat { flex: 1; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-l { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-btn { padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); font-size: 12px; cursor: pointer; background: transparent; color: var(--color-text-secondary); transition: all 0.15s; }
.filter-btn.active { background: #E1F5EE; color: #0F6E56; border-color: #1D9E75; }
.done-msg { text-align: center; padding: 2rem; }
.done-msg h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; color: var(--color-text-primary); }
.done-msg p { color: var(--color-text-secondary); font-size: 14px; margin-bottom: 1.5rem; }
.counter { font-size: 14px; color: var(--color-text-secondary); }
</style>

<div id="app">
  <div class="header">
    <span style="font-size:15px;font-weight:500;color:var(--color-text-primary)">Verben mit Präpositionen</span>
    <span class="counter" id="counter">1 / 48</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all')">alle</button>
    <button class="filter-btn" onclick="setFilter('auf')">auf</button>
    <button class="filter-btn" onclick="setFilter('an')">an</button>
    <button class="filter-btn" onclick="setFilter('über')">über</button>
    <button class="filter-btn" onclick="setFilter('mit')">mit</button>
    <button class="filter-btn" onclick="setFilter('von')">von</button>
    <button class="filter-btn" onclick="setFilter('für')">für</button>
    <button class="filter-btn" onclick="setFilter('zu')">zu</button>
    <button class="filter-btn" onclick="setFilter('nach')">nach</button>
  </div>
  <div class="card-wrap" onclick="flipCard()">
    <div class="card" id="card">
      <div class="face front">
        <div class="verb" id="verb">warten</div>
        <div class="arabic" id="arabic">ينتظر</div>
        <div class="hint">tippen zum umdrehen</div>
      </div>
      <div class="face back">
        <div class="verb" id="verb2">warten</div>
        <div class="prep-badge" id="prep">auf + Akk</div>
        <div class="arabic" id="arabic2">ينتظر</div>
      </div>
    </div>
  </div>
  <div class="btns" id="btns" style="display:none">
    <button class="btn wrong" onclick="answer(false)">✗ nochmal</button>
    <button class="btn correct" onclick="answer(true)">✓ gewusst</button>
  </div>
  <div class="btns" id="flipbtn">
    <button class="btn" onclick="flipCard()">umdrehen ↓</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-correct" style="color:#1D9E75">0</div><div class="stat-l">gewusst</div></div>
    <div class="stat"><div class="stat-n" id="s-wrong" style="color:#D85A30">0</div><div class="stat-l">nochmal</div></div>
    <div class="stat"><div class="stat-n" id="s-left">48</div><div class="stat-l">verbleibend</div></div>
  </div>
</div>

<script>
const ALL = [
  {v:"warten",a:"ينتظر",p:"auf + Akk"},
  {v:"fragen",a:"يسأل",p:"nach + Dat"},
  {v:"suchen",a:"يبحث",p:"nach + Dat"},
  {v:"teilnehmen",a:"يشارك",p:"an + Dat"},
  {v:"sich erinnern",a:"يتذكر",p:"an + Akk"},
  {v:"sich ärgern",a:"يغضب / ينزعج",p:"über + Akk"},
  {v:"sich interessieren",a:"يهتم",p:"für + Akk"},
  {v:"sich interessieren",a:"يهتم (2)",p:"an + Dat"},
  {v:"einladen",a:"يدعو",p:"zu + Dat"},
  {v:"gratulieren",a:"يهنئ",p:"zu + Dat"},
  {v:"antworten",a:"يجيب / يرد",p:"auf + Akk"},
  {v:"danken",a:"يشكر",p:"für + Akk"},
  {v:"sich gewöhnen",a:"يعتاد",p:"an + Akk"},
  {v:"sich freuen",a:"يفرح / يتطلع",p:"auf + Akk / über + Akk"},
  {v:"warnen",a:"يحذر",p:"vor + Dat"},
  {v:"aufpassen",a:"ينتبه / يحذر",p:"auf + Akk"},
  {v:"achten",a:"ينتبه / يراعي",p:"auf + Akk"},
  {v:"telefonieren",a:"يتحدث في الهاتف",p:"mit + Dat"},
  {v:"träumen",a:"يحلم",p:"von + Dat"},
  {v:"sich informieren",a:"يستعلم",p:"über + Akk"},
  {v:"sich streiten",a:"يتشاجر",p:"mit + Dat / über + Akk"},
  {v:"sprechen",a:"يتحدث",p:"mit + Dat / über + Akk"},
  {v:"denken",a:"يفكر",p:"an + Akk"},
  {v:"nachdenken",a:"يفكر بعمق",p:"über + Akk"},
  {v:"lachen",a:"يضحك",p:"über + Akk"},
  {v:"weinen",a:"يبكي",p:"über + Akk"},
  {v:"sich trennen",a:"ينفصل",p:"von + Dat"},
  {v:"leiden",a:"يعاني",p:"an + Dat / unter + Dat"},
  {v:"sich fürchten",a:"يخاف",p:"vor + Dat"},
  {v:"zufrieden sein",a:"يكون راضياً",p:"mit + Dat"},
  {v:"spielen",a:"يلعب",p:"mit + Dat"},
  {v:"sich beschäftigen",a:"ينشغل / يعمل على",p:"mit + Dat"},
  {v:"klagen",a:"يشتكي",p:"über + Akk"},
  {v:"sich beschweren",a:"يتذمر / يشتكي",p:"über + Akk"},
  {v:"sich entschuldigen",a:"يعتذر",p:"für + Akk"},
  {v:"sich entscheiden",a:"يقرر",p:"für + Akk / gegen + Akk"},
  {v:"sterben",a:"يموت",p:"an + Dat"},
  {v:"streben",a:"يسعى",p:"nach + Dat"},
  {v:"hoffen",a:"يأمل",p:"auf + Akk"},
  {v:"zweifeln",a:"يشك",p:"an + Dat"},
  {v:"sich vorbereiten",a:"يستعد",p:"auf + Akk"},
  {v:"schmecken",a:"طعمه / مذاقه",p:"nach + Dat"},
  {v:"sich entschuldigen",a:"يعتذر (bei)",p:"bei + Dat / für + Akk"},
  {v:"zahlen",a:"يدفع",p:"für + Akk"},
  {v:"es geht",a:"يتعلق بـ",p:"um + Akk"},
  {v:"sich bewerben",a:"يتقدم لوظيفة",p:"um + Akk"},
  {v:"erzählen",a:"يحكي / يروي",p:"von + Dat"},
];

let deck = [], idx = 0, correct = 0, wrong = 0, flipped = false, filter = 'all';

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  resetDeck();
}

function resetDeck() {
  deck = ALL.filter(x => filter === 'all' || x.p.includes(filter));
  deck = deck.sort(() => Math.random() - 0.5);
  idx = 0; correct = 0; wrong = 0; flipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('btns').style.display = 'none';
  document.getElementById('flipbtn').style.display = '';
  updateStats();
  showCard();
}

function showCard() {
  if (idx >= deck.length) { showDone(); return; }
  const c = deck[idx];
  document.getElementById('verb').textContent = c.v;
  document.getElementById('verb2').textContent = c.v;
  document.getElementById('arabic').textContent = c.a;
  document.getElementById('arabic2').textContent = c.a;
  document.getElementById('prep').textContent = c.p;
  document.getElementById('counter').textContent = (idx+1) + ' / ' + deck.length;
  document.getElementById('prog').style.width = (idx/deck.length*100)+'%';
  document.getElementById('s-left').textContent = deck.length - idx;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('btns').style.display = 'none';
  document.getElementById('flipbtn').style.display = '';
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('btns').style.display = '';
    document.getElementById('flipbtn').style.display = 'none';
  }, 220);
}

function answer(ok) {
  if (ok) correct++; else { wrong++; deck.push(deck[idx]); }
  idx++;
  updateStats();
  showCard();
}

function updateStats() {
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-left').textContent = Math.max(0, deck.length - idx);
}

function showDone() {
  document.getElementById('app').innerHTML = `
    <div class="done-msg">
      <h2>Geschafft!</h2>
      <p>gewusst: ${correct} &nbsp;|&nbsp; nochmal: ${wrong}</p>
      <button class="btn" onclick="location.reload()">von vorne ↺</button>
    </div>`;
}

resetDeck();
</script>
